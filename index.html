<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project SAU | Infraestructura y Defensa Digital</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <meta name="description" content="Project SAU — Infraestructura y Defensa Digital">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #shader-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .brand {
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.5s;
    }

    .brand-name {
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 60px rgba(100, 180, 255, 0.3), 0 0 120px rgba(80, 140, 255, 0.15);
      line-height: 1.1;
    }

    .brand-sub {
      font-size: clamp(0.7rem, 1.4vw, 1rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 12px;
    }

    .divider {
      width: 60px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      margin: 24px auto 0;
    }

    .enter-btn {
      margin-top: 48px;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 1.8s;
      pointer-events: auto;
    }

    .enter-btn a {
      display: inline-block;
      padding: 14px 52px;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.05);
      transition: all 0.4s ease;
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .enter-btn a:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.6);
      box-shadow: 0 0 40px rgba(100, 180, 255, 0.2);
      transform: scale(1.06);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(100,180,255,0.05); }
      50% { box-shadow: 0 0 24px rgba(100,180,255,0.15); }
    }

    /* Floating icon hints */
    .floating-icons {
      position: fixed;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 40px;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 2.8s;
    }

    .floating-icons svg {
      width: 20px; height: 20px;
      stroke: rgba(255,255,255,0.25);
      stroke-width: 1.5;
      fill: none;
      animation: iconFloat 4s ease-in-out infinite;
    }

    .floating-icons svg:nth-child(2) { animation-delay: 0.5s; }
    .floating-icons svg:nth-child(3) { animation-delay: 1s; }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>

  <div id="shader-bg"></div>

  <div class="overlay">
    <div class="brand">
      <div class="brand-name">Project SAU</div>
      <div class="brand-sub">Infraestructura y Defensa Digital</div>
      <div class="divider"></div>
    </div>
    <div class="enter-btn">
      <a href="https://sentriasec.com">Entrar</a>
    </div>
  </div>

  <!-- Floating icons: Shield, Brain, Rocket -->
  <div class="floating-icons">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7v5c0 5.55 3.84 10.74 10 12 6.16-1.26 10-6.45 10-12V7L12 2z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M12 2a9 9 0 0 0-9 9c0 3.87 2.13 7.24 5.25 9h.02A9.96 9.96 0 0 0 12 21a9.96 9.96 0 0 0 3.73-1H15.75A9.93 9.93 0 0 0 21 11a9 9 0 0 0-9-9z"/><path d="M9 10h.01M15 10h.01M9.5 15a3.5 3.5 0 0 0 5 0"/></svg>
    <svg viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
  </div>

  <script>
  (function() {
    var container = document.getElementById('shader-bg');

    var scene = new THREE.Scene();
    var camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    var material = new THREE.ShaderMaterial({
      uniforms: {
        iTime: { value: 0 },
        iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
      },
      vertexShader: [
        'void main() {',
        '  gl_Position = vec4(position, 1.0);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'uniform float iTime;',
        'uniform vec2 iResolution;',
        '#define NUM_OCTAVES 3',
        '',
        'float rand(vec2 n) {',
        '  return fract(sin(dot(n, vec2(12.9898, 4.1414))) * 43758.5453);',
        '}',
        '',
        'float noise(vec2 p) {',
        '  vec2 ip = floor(p);',
        '  vec2 u = fract(p);',
        '  u = u*u*(3.0-2.0*u);',
        '  float res = mix(',
        '    mix(rand(ip), rand(ip + vec2(1.0, 0.0)), u.x),',
        '    mix(rand(ip + vec2(0.0, 1.0)), rand(ip + vec2(1.0, 1.0)), u.x), u.y);',
        '  return res * res;',
        '}',
        '',
        'float fbm(vec2 x) {',
        '  float v = 0.0;',
        '  float a = 0.3;',
        '  vec2 shift = vec2(100);',
        '  mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));',
        '  for (int i = 0; i < NUM_OCTAVES; ++i) {',
        '    v += a * noise(x);',
        '    x = rot * x * 2.0 + shift;',
        '    a *= 0.4;',
        '  }',
        '  return v;',
        '}',
        '',
        'void main() {',
        '  vec2 shake = vec2(sin(iTime * 1.2) * 0.005, cos(iTime * 2.1) * 0.005);',
        '  vec2 p = ((gl_FragCoord.xy + shake * iResolution.xy) - iResolution.xy * 0.5) / iResolution.y * mat2(6.0, -4.0, 4.0, 6.0);',
        '  vec2 v;',
        '  vec4 o = vec4(0.0);',
        '  float f = 2.0 + fbm(p + vec2(iTime * 5.0, 0.0)) * 0.5;',
        '  for (float i = 0.0; i < 35.0; i++) {',
        '    v = p + cos(i * i + (iTime + p.x * 0.08) * 0.025 + i * vec2(13.0, 11.0)) * 3.5 + vec2(sin(iTime * 3.0 + i) * 0.003, cos(iTime * 3.5 - i) * 0.003);',
        '    float tailNoise = fbm(v + vec2(iTime * 0.5, i)) * 0.3 * (1.0 - (i / 35.0));',
        '    vec4 auroraColors = vec4(',
        '      0.1 + 0.3 * sin(i * 0.2 + iTime * 0.4),',
        '      0.3 + 0.5 * cos(i * 0.3 + iTime * 0.5),',
        '      0.7 + 0.3 * sin(i * 0.4 + iTime * 0.3),',
        '      1.0',
        '    );',
        '    vec4 currentContribution = auroraColors * exp(sin(i * i + iTime * 0.8)) / length(max(v, vec2(v.x * f * 0.015, v.y * 1.5)));',
        '    float thinnessFactor = smoothstep(0.0, 1.0, i / 35.0) * 0.6;',
        '    o += currentContribution * (1.0 + tailNoise * 0.8) * thinnessFactor;',
        '  }',
        '  o = tanh(pow(o / 100.0, vec4(1.6)));',
        '  gl_FragColor = o * 1.5;',
        '}'
      ].join('\n')
    });

    var geometry = new THREE.PlaneGeometry(2, 2);
    var mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    function animate() {
      material.uniforms.iTime.value += 0.016;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', function() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      material.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
    });
  })();
  </script>
</body>
</html>
