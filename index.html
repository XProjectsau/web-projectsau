<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project SAU</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <meta name="description" content="Project SAU — Infraestructura y Defensa Digital">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .enter-btn {
      position: fixed;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .enter-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .enter-btn a {
      display: inline-block;
      padding: 14px 48px;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.06);
      transition: all 0.35s ease;
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    .enter-btn a:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.7);
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
      transform: scale(1.05);
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(255,255,255,0.05); }
      50% { box-shadow: 0 0 25px rgba(255,255,255,0.12); }
    }
  </style>
</head>
<body>
  <canvas id="spiral"></canvas>
  <div class="enter-btn" id="enterBtn">
    <a href="https://sentriasec.com">Enter</a>
  </div>

  <script>
  (function() {
    // --- Seeded random ---
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    var rng = mulberry32(42);

    // --- Vec helpers ---
    function v2(x, y) { return { x: x, y: y }; }
    function v3(x, y, z) { return { x: x, y: y, z: z }; }
    function v2lerp(a, b, t) { return v2(a.x + (b.x - a.x) * t, a.y + (b.y - a.y) * t); }

    // --- Canvas setup ---
    var canvas = document.getElementById('spiral');
    var ctx = canvas.getContext('2d');
    var W, H, dpr;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // --- Config ---
    var NUM_STARS = 5000;
    var SPIRAL_TURNS = 6;
    var SPIRAL_RADIUS = Math.min(W, H) * 0.42;
    var TRAIL_LENGTH = 6;
    var BASE_SPEED = 0.00012;
    var FOV = 800;
    var CENTER_X = W / 2;
    var CENTER_Y = H / 2;

    // --- 3D project ---
    function project(p3) {
      var scale = FOV / (FOV + p3.z);
      return {
        x: CENTER_X + p3.x * scale,
        y: CENTER_Y + p3.y * scale,
        scale: scale
      };
    }

    // --- Spiral path ---
    function spiralPoint(t) {
      var angle = t * SPIRAL_TURNS * Math.PI * 2;
      var r = t * SPIRAL_RADIUS;
      return v3(
        Math.cos(angle) * r,
        Math.sin(angle) * r,
        (t - 0.5) * 400
      );
    }

    // --- Star class ---
    function Star(idx) {
      this.t = rng();
      this.speed = BASE_SPEED * (0.5 + rng() * 1.0);
      this.offset = v2((rng() - 0.5) * 30, (rng() - 0.5) * 30);
      this.size = 0.5 + rng() * 1.8;
      this.brightness = 0.3 + rng() * 0.7;
      this.trail = [];
    }

    Star.prototype.update = function(dt) {
      this.t += this.speed * dt;
      if (this.t > 1) this.t -= 1;

      var p = spiralPoint(this.t);
      p.x += this.offset.x;
      p.y += this.offset.y;

      var projected = project(p);
      this.screen = projected;

      this.trail.unshift({ x: projected.x, y: projected.y, s: projected.scale });
      if (this.trail.length > TRAIL_LENGTH) this.trail.pop();
    };

    Star.prototype.render = function(ctx) {
      if (!this.screen) return;
      var s = this.screen.scale;
      var alpha = this.brightness * Math.min(s * 1.2, 1);
      var r = this.size * s;

      // Trail
      if (this.trail.length > 1) {
        for (var i = 1; i < this.trail.length; i++) {
          var ta = alpha * (1 - i / this.trail.length) * 0.3;
          if (ta < 0.01) continue;
          ctx.beginPath();
          ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
          ctx.lineTo(this.trail[i].x, this.trail[i].y);
          ctx.strokeStyle = 'rgba(255,255,255,' + ta.toFixed(3) + ')';
          ctx.lineWidth = r * 0.5 * (1 - i / this.trail.length);
          ctx.stroke();
        }
      }

      // Dot
      if (r > 0.15) {
        ctx.beginPath();
        ctx.arc(this.screen.x, this.screen.y, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';
        ctx.fill();
      }
    };

    // --- Generate stars ---
    var stars = [];
    for (var i = 0; i < NUM_STARS; i++) {
      stars.push(new Star(i));
    }

    // --- Animation loop ---
    var lastTime = 0;
    var progress = { value: 0 };

    // GSAP ramp-up
    gsap.to(progress, {
      value: 1,
      duration: 3,
      ease: 'power2.inOut'
    });

    function loop(time) {
      requestAnimationFrame(loop);
      if (!lastTime) { lastTime = time; return; }
      var rawDt = time - lastTime;
      lastTime = time;
      var dt = rawDt * progress.value;

      // Recalc center on resize
      CENTER_X = window.innerWidth / 2;
      CENTER_Y = window.innerHeight / 2;
      SPIRAL_RADIUS = Math.min(window.innerWidth, window.innerHeight) * 0.42;

      // Fade trail bg
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(0, 0, W, H);

      // Update & render
      for (var i = 0; i < stars.length; i++) {
        stars[i].update(dt);
      }
      // Sort by z (back to front) — use scale as proxy
      stars.sort(function(a, b) {
        return (a.screen ? a.screen.scale : 0) - (b.screen ? b.screen.scale : 0);
      });
      for (var i = 0; i < stars.length; i++) {
        stars[i].render(ctx);
      }
    }

    requestAnimationFrame(loop);

    // Show enter button after 2s
    setTimeout(function() {
      document.getElementById('enterBtn').classList.add('visible');
    }, 2000);
  })();
  </script>
</body>
</html>
